<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>실시간 위치 추적 앱</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  font-family: sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

#map {
  width:90%;
  height:400px;
  margin-top:20px;
}

input { padding:8px; width:200px; }
button { padding:8px 12px; cursor:pointer; }
</style>
</head>

<body>

<h2>📍 실시간 위치 추적 앱</h2>

<input id="id" placeholder="아이디">
<input id="pw" type="password" placeholder="비밀번호">

<button id="signup">회원가입</button>
<button id="login">로그인</button>
<button id="logout">로그아웃</button>

<button id="startTracking">▶️ 추적 시작</button>
<button id="stopTracking">⏹ 추적 정지</button>

<div id="status">로그인 안됨</div>
<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const FREE_TIME = 10 * 60 * 1000;
  const START_KEY = "start_time";

  let currentUser = null;
  let watchId = null;
  let path = [];

  let map = L.map('map').setView([37.5665, 126.9780], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  let polyline = L.polyline([], {color:'blue'}).addTo(map);

  // ------------------------
  // 유저 관리
  // ------------------------
  function getUsers() {
    return JSON.parse(localStorage.getItem("users")) || [];
  }

  function saveUsers(users) {
    localStorage.setItem("users", JSON.stringify(users));
  }

  function setStatus(text) {
    document.getElementById("status").innerText = text;
  }

  // ------------------------
  // 회원가입
  // ------------------------
  document.getElementById("signup").onclick = () => {
    const id = document.getElementById("id").value;
    const pw = document.getElementById("pw").value;

    let users = getUsers();

    if (users.find(u => u.id === id)) {
      alert("이미 존재하는 아이디");
      return;
    }

    users.push({ id, pw, locations: [] });
    saveUsers(users);

    alert("회원가입 완료!");
  };

  // ------------------------
  // 로그인
  // ------------------------
  document.getElementById("login").onclick = () => {
    const id = document.getElementById("id").value;
    const pw = document.getElementById("pw").value;

    let users = getUsers();
    let user = users.find(u => u.id === id && u.pw === pw);

    if (user) {
      currentUser = user;
      localStorage.setItem("currentUser", id);
      setStatus("로그인: " + id);
      loadUserLocations();
    } else {
      alert("로그인 실패");
    }
  };

  // ------------------------
  // 로그아웃
  // ------------------------
  document.getElementById("logout").onclick = () => {
    currentUser = null;
    localStorage.removeItem("currentUser");
    setStatus("로그아웃됨");
  };

  // 자동 로그인
  const savedId = localStorage.getItem("currentUser");
  if (savedId) {
    const user = getUsers().find(u => u.id === savedId);
    if (user) {
      currentUser = user;
      setStatus("자동 로그인: " + savedId);
      loadUserLocations();
    }
  }

  // ------------------------
  // 🔥 추적 시작
  // ------------------------
  document.getElementById("startTracking").onclick = () => {

    let startTime = localStorage.getItem(START_KEY);
    const now = Date.now();

    if (!startTime) {
      startTime = now;
      localStorage.setItem(START_KEY, startTime);
    }

    const elapsed = now - startTime;

    if (elapsed > FREE_TIME && !currentUser) {
      alert("로그인 필요!");
      return;
    }

    if (!navigator.geolocation) {
      alert("위치 지원 안됨");
      return;
    }

    watchId = navigator.geolocation.watchPosition(position => {

      const lat = position.coords.latitude;
      const lng = position.coords.longitude;

      path.push([lat, lng]);

      map.setView([lat, lng], 16);
      L.marker([lat, lng]).addTo(map);

      polyline.setLatLngs(path);

      if (currentUser) {
        saveLocation(lat, lng);
      }

    }, err => {
      alert(err.message);
    }, {
      enableHighAccuracy: true,
      maximumAge: 0
    });

    setStatus("🔴 실시간 추적 중...");
  };

  // ------------------------
  // ⏹ 추적 정지
  // ------------------------
  document.getElementById("stopTracking").onclick = () => {
    if (watchId !== null) {
      navigator.geolocation.clearWatch(watchId);
      watchId = null;
      setStatus("⏹ 추적 중지됨");
    }
  };

  // ------------------------
  // 위치 저장
  // ------------------------
  function saveLocation(lat, lng) {
    let users = getUsers();
    let user = users.find(u => u.id === currentUser.id);

    user.locations.push({ lat, lng, time: new Date().toLocaleString() });

    saveUsers(users);
  }

  // ------------------------
  // 위치 불러오기
  // ------------------------
  function loadUserLocations() {
    path = [];

    currentUser.locations.forEach(loc => {
      path.push([loc.lat, loc.lng]);

      L.marker([loc.lat, loc.lng])
        .addTo(map)
        .bindPopup(loc.time);
    });

    polyline.setLatLngs(path);
  }

});
</script>

</body>
</html>
